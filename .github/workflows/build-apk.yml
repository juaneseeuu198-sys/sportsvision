name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Aceptar licencias Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Crear local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --info 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SportsVision-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
