{% extends 'base/base.html' %}
{% load static %}
{% block title %}SportsVision — Login{% endblock %}

{% block public_content %}
<div class="auth-form-page">

  <!-- IMAGEN DE FONDO REAL -->
  <img src="{% static 'images/login_bg.jpg' %}"
       alt="Gym background"
       style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.5;">

  <!-- Overlay para legibilidad -->

  <div class="auth-form-box" style="position:relative;z-index:2;background:rgba(8,10,22,0.88);backdrop-filter:blur(12px);border-radius:24px;border:1.5px solid rgba(255,255,255,0.08);box-shadow:0 24px 60px rgba(0,0,0,0.7);padding:36px 32px;">
    <h1 class="auth-form-title">LOGIN</h1>

    <form method="post" class="w-100">
      {% csrf_token %}

      <div class="mb-3">
        <label class="sv-label">Usuario o Correo</label>
        <input type="text" name="identifier" class="form-control sv-input"
               placeholder="Tu usuario o correo electrónico" required
               autocomplete="username"
               value="{{ identifier }}">
      </div>

      <div class="mb-4">
        <label class="sv-label">Contraseña</label>
        <input type="password" name="password" class="form-control sv-input"
               placeholder="Tu contraseña" required
               autocomplete="current-password">
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 mb-3 text-center" style="font-size:13px;">
        {{ error }}
      </div>
      {% endif %}

      <button type="submit" class="btn-sv-outline w-100 py-3">INICIAR SESIÓN</button>
    </form>

    <p class="mt-3 text-center" style="color:#888;">
      ¿No tienes cuenta? <a href="{% url 'registro' %}" style="color:var(--sv-purple-light);">Regístrate</a>
    </p>
    <p class="text-center mt-2">
      <a href="{% url 'landing' %}" style="color:#555;font-size:13px;">← Volver al inicio</a>
    </p>
  </div>
</div>
{% endblock %}
